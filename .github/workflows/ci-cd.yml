name: Surqo CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check app/

      - name: Run tests
        run: uv run pytest tests/ --cov=app --cov-report=term-missing -v
        env:
          LLM_PROVIDER: "groq"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'test_key' }}
          GROQ_MODEL: "llama-3.3-70b-versatile"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY || 'placeholder' }}
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379"
          RESEND_API_KEY: "test_key"
          FROM_EMAIL: "alertas@surqo.io"
          HIVEMQ_HOST: "broker.hivemq.com"
          HIVEMQ_USERNAME: ""
          HIVEMQ_PASSWORD: ""
          LOGFIRE_TOKEN: ""
          APP_ENV: "test"

  deploy-backend:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  notify-deploy:
    needs: [deploy-backend]
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Summarize deploy
        run: |
          BACKEND="${{ needs.deploy-backend.result }}"
          echo "Surqo deploy summary"
          echo "  Backend  (Fly.io)  -> $BACKEND"
          echo "  Frontend (Vercel)  -> auto-deploy via GitHub integration"
          if [[ "$BACKEND" == "success" ]]; then
            echo "Deploy completo — surqo-api.fly.dev y surqo.vercel.app actualizados"
          elif [[ "$BACKEND" == "skipped" ]]; then
            echo "Deploy omitido — los tests fallaron o este evento no es push a master."
            exit 1
          else
            echo "Backend deploy fallo. Revisa los logs del job deploy-backend."
            exit 1
          fi
