name: Surqo CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check app/

      - name: Run tests
        run: uv run pytest tests/ --cov=app --cov-report=term-missing -v
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY || 'placeholder' }}
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379"
          RESEND_API_KEY: "test_key"
          FROM_EMAIL: "alertas@surqo.io"
          HIVEMQ_HOST: "broker.hivemq.com"
          HIVEMQ_USERNAME: ""
          HIVEMQ_PASSWORD: ""
          LOGFIRE_TOKEN: ""
          APP_ENV: "test"

  deploy-backend:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Render
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json"

      - name: Confirm backend deploy triggered
        run: echo "✅ Backend deploy hook enviado a Render"

  deploy-frontend:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./frontend

  notify-deploy:
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Summarize deploy
        run: |
          BACKEND="${{ needs.deploy-backend.result }}"
          FRONTEND="${{ needs.deploy-frontend.result }}"
          echo "🌾 Surqo deploy summary"
          echo "  Backend  → $BACKEND"
          echo "  Frontend → $FRONTEND"
          if [[ "$BACKEND" == "success" && "$FRONTEND" == "success" ]]; then
            echo "✅ Deploy completo — surqo.vercel.app está actualizado"
          else
            echo "⚠️  Algún deploy falló. Revisa los logs de cada job."
            exit 1
          fi
